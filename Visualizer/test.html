<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniKanren Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: auto; 
        }
        
        .scroll-container {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100vw;
            height: 100vh;
            overflow: auto; 
            position: relative;
        }
        
        
        svg {
            display: block;
            overflow: visible;
        }
        
        .node rect {
            fill: lightgray;
            stroke: black;
        }
        
        .link {
            fill: none;
            stroke: #ccc;
            stroke-width: 2px;
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        <svg></svg>
    </div>
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const svg = d3.select("svg").append("g");
        
        let treeData = {
            "name": "Answer",
            "sub": [
            {
                "key": 0,
                "value": "abc"
            },
            {
                "key": 1,
                "value": "def"
            },
            {
                "key": 2,
                "value": "ghi"
            }
            ],
            "children": [
            {
                "name": "+->",
                "children": [
                {
                    "name": "Fresh",
                    "vars": [
                    "a",
                    "ad",
                    "add"
                    ],
                    "children": [
                    {
                        "name": "Goal-Conj",
                        "children": [
                        {
                            "name": "Unify",
                            "left": "a",
                            "right": "d"
                        },
                        {
                            "name": "Unify",
                            "left": "add",
                            "right": "jkl"
                        }
                        ]
                    }
                    ],
                    "sub": [
                    {
                        "key": 0,
                        "value": "mno"
                    },
                    {
                        "key": 1,
                        "value": "pqr"
                    },
                    {
                        "key": 2,
                        "value": "stu"
                    }
                    ]
                },
                {
                    "name": "<-+",
                    "children": [
                    {
                        "name": "Conjunction",
                        "children": [
                        {
                            "name": "Delay",
                            "children": [
                            {
                                "name": "Empty"
                            }
                            ]
                        },
                        {
                            "name": "Rel-Call",
                            "rel": "testo",
                            "args": [
                            "abc"
                            ]
                        }
                        ]
                    },
                    {
                        "name": "Goal-Disj",
                        "children": [
                        {
                            "name": "Rel-Call",
                            "rel": "testo",
                            "args": [
                            "vwx",
                            "yz"
                            ]
                        },
                        {
                            "name": "Unify",
                            "left": "abc",
                            "right": "abc"
                        }
                        ],
                        "sub": [
                        {
                            "key": 0,
                            "value": "def"
                        },
                        {
                            "key": 1,
                            "value": 2
                        },
                        {
                            "key": 2,
                            "value": [
                            "ghi",
                            "jkl",
                            "empty"
                            ]
                        }
                        ]
                    }
                    ]
                }
                ]
            }
            ]
        };
        
        // Create a tree layout
        const treeLayout = d3.tree().nodeSize([150, 100]);
        const root = d3.hierarchy(addColors(treeData));
        treeLayout(root);
        
        const nodes = root.descendants();
        nodes.forEach(node => console.log(node));
        const links = root.links();
        
        function updateScrollBar() {
            // Calculate dynamic SVG dimensions
            const minX = Math.min(...nodes.map(d => d.x));
            const maxX = Math.max(...nodes.map(d => d.x));
            const minY = Math.min(...nodes.map(d => d.y));
            const maxY = Math.max(...nodes.map(d => d.y));
            const padding = 200;
            
            // Adjust the SVG size
            const svgWidth = maxX - minX + padding;
            const svgHeight = maxY - minY + padding;
            
            d3.select("svg")
            .attr("width", svgWidth)
            .attr("height", svgHeight);
            
            // Center the tree by applying a transform
            svg.attr(
            "transform",
            `translate(${(svgWidth / 2) - ((maxX + minX) / 2)},${padding / 2})`
            );
        }
        
        
        function toString(node, indent = "") {
            // Check if the node is a top-level conjunction with a "state"
            if (node.name === "Conjunction" && node.sub) {
                const stateLines = (node.sub || [])
                .map(({ key, value }) => `${indent}${key} => ${value}`)
                .join("\n");
                
                return `${indent}Conjunction\n${stateLines}`;
            }
            
            return `${indent}${node.name}`;
        }

        function subToString(sub) {
            return sub
            .map(({ key, value }) => `${key} => ${value}`)
            .join("\n");
        }
        
        
        // Draw links
        svg.selectAll(".link")
        .data(links)
        .join("path")
        .attr("class", "link")
        .attr("d", d3.linkVertical()
        .x(d => d.x)
        .y(d => d.y))
        .style("stroke", d => {
            if (d.target.data.color) return d.target.data.color;
            else return "#ccc";
        })
        .style("stroke-width", 2);
        
        // Draw nodes
        const nodeGroups = svg.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.x},${d.y})`)
        .on("click", (event, d) => {
            alert(toString(d.data));
        });

        const tooltip = d3.select("body")
    .append("div")
    .style("position", "absolute")
    .style("background-color", "white")
    .style("border", "1px solid #ccc")
    .style("border-radius", "5px")
    .style("padding", "5px")
    .style("visibility", "hidden");

nodeGroups.on("mouseover", (event, d) => {
    const subText = d.data.sub ? `<strong>Sub:</strong> ${subToString(d.data.sub).replace(/\n/g, "<br>")}` : "";
    const varsText = d.data.vars ? `<strong>Vars:</strong> ${d.data.vars.join(", ").replace(/\n/g, "<br>")}` : "";

    tooltip.html(`<strong>Name:</strong> ${d.data.name}<br>
                  ${subText}<br>
                  ${varsText}`)
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY + 10) + "px")
        .style("visibility", "visible");
}).on("mouseout", () => {
    tooltip.style("visibility", "hidden");
});



    function drawAnswerNode(group) {
        group.append("circle")
            .attr("r", 30)
            .attr("fill", "green")
            .attr("stroke", "yellow")
            .attr("stroke-width", "5px")
            .append("text")
            .text("Answer")
            .attr("text-anchor", "middle")
            .attr("dy", ".35em")
            .style("font-size", "12px")
            .style("fill", "#000000");
    }

function drawUnifyNode(group, data) {
    const unificationText = `(== ${data.left} ${data.right})`;

    // Measure the text width
    const tempText = group.append("text")
        .text(unificationText)
        .style("font-size", "12px")
        .style("visibility", "hidden");

    const textWidth = tempText.node().getBBox().width;
    const boxPadding = 10;

    tempText.remove();

    group.append("rect")
        .attr("width", textWidth + 2 * boxPadding)
        .attr("height", 30)
        .attr("fill", "#cccccc")
        .attr("stroke", "#000000")
        .attr("stroke-width", 2)
        .attr("x", -(textWidth / 2 + boxPadding))
        .attr("y", -15);

    group.append("text")
        .text(unificationText)
        .attr("text-anchor", "middle")
        .attr("dy", ".35em")
        .style("font-size", "12px")
        .style("fill", "#000000");
}

function drawOtherNode(group, data, type) {
    const label = `[${type}]`;
    const tempText = group.append("text")
        .text(label)
        .style("font-size", "12px")
        .style("visibility", "hidden");

    const textWidth = tempText.node().getBBox().width;
    const boxPadding = 10;

    tempText.remove();

    group.append("rect")
        .attr("width", textWidth + 2 * boxPadding)
        .attr("height", 30)
        .attr("fill", "#eeeeee")
        .attr("stroke", "#000000")
        .attr("stroke-width", 2)
        .attr("x", -(textWidth / 2 + boxPadding))
        .attr("y", -15);

    group.append("text")
        .text(label)
        .attr("text-anchor", "middle")
        .attr("dy", ".35em")
        .style("font-size", "12px")
        .style("fill", "#000000");
}

function drawTree(nodeGroups) {
    nodeGroups.each(function (d) {
        const group = d3.select(this);
        const { name } = d.data;

        if (name === "Answer") {
            drawAnswerNode(group);
        } else if (name === "Unify") {
            drawUnifyNode(group, d.data);
        } else if (
            ["Disjunction", "Conjunction", "Fresh", "Goal-Conj", "Goal-Disj", "Delay", "Rel-call"].includes(name)
        ) {
            drawOtherNode(group, d.data, name);
        }
    });
}

drawTree(nodeGroups);




        // nodeGroups
        // .filter(d => d.data.name != "Answer" || d.data.name != "Unify")
        // .append("rect")
        // .attr("x", d => -((d.data.name.length * 7 + 20) / 2))
        // .attr("y", -15)
        // .attr("width", d => d.data.name.length * 7 + 20)
        // .attr("height", 30)
        // .attr("fill", "lightgray")
        // .attr("stroke", "black");
        
        // nodeGroups.append("text")
        // .attr("dy", 5)
        // .attr("text-anchor", "middle")
        // .text(d => d.data.name);
        
        const simulation = d3.forceSimulation(root.descendants())
        .force("link", d3.forceLink(root.links()).distance(100)) // Control link distance
        .force("charge", d3.forceManyBody().strength(-200)) // Repel nodes horizontally
        .force("center", d3.forceCenter(500, 300)) // TODO
        .force("collision", d3.forceCollide().radius(100)) // Ensure no horizontal overlap
        .on("tick", () => {
            // Constrain nodes to their vertical positions
            root.descendants().forEach(d => {
                d.y = d.depth * 150; // Keep y aligned based on depth in the tree
            });
            updateScrollBar();
            // Update node and link positions
            svg.selectAll(".node")
            .attr("transform", d => `translate(${d.x},${d.y})`);
            
            svg.selectAll(".link")
            .attr("d", d3.linkVertical()
            .x(d => d.x)
            .y(d => d.y));
        });

        function addColors(tree) {
            let children = tree.children
            console.log(children)
            console.log(tree.name)
            switch (tree.name) {
                case "<-+":
                    children[0].color = "green";
                    addColors(children[0]);
                    break;
                case "+->":
                    children[1].color = "green";
                    addColors(children[1]);
                    break;
                case "Disjunction":
                    children[0].color = "#FFA500";
                    addColors(children[0]);
                    break;
                case "Conjunction":
                    children.forEach(c => 
                    {c.color = "#008080";
                        addColors(c)
                    })
                    break;
                case  "Fresh":
                    children[0].color = "red";
                    addColors(children[0]);
                    break;
                case "Goal-Conj":
                    children.forEach(c => c.color = "#9370DB");
                    children.forEach(c => addColors(c));
                    break;
                case "Goal-Disj":
                    children.forEach(c => {
                        c.color = "#1E90FF";
                        addColors(c)
                    })
                    break;
                case "Answer":
                    children[0].color = "#32CD32";
                    addColors(children[0]);
                    break;
                case "Delay":
                    children[0].color = "#FFBF00";
                    addColors(children[0])
                    break;
            }
            return tree;
        }
        
        function flattenGoalConj(tree) {
            // Helper function to recursively flatten `Goal-Conj`
            function processNode(node) {
                // Check if the current node is a `Goal-Conj`
                if (node.name === "Goal-Conj" && Array.isArray(node.children)) {
                    // Collect children that are also `Goal-Conj`
                    let flattenedChildren = [];
                    for (let child of node.children) {
                        if (child.name === "Goal-Conj" && Array.isArray(child.children)) {
                            // Merge the child's children into `flattenedChildren`
                            flattenedChildren.push(...child.children);
                        } else {
                            // Add non-Goal-Conj children directly
                            flattenedChildren.push(child);
                        }
                    }
                    // Update this node's children with the flattened children
                    node.children = flattenedChildren;
                }
                
                // Recursively process all children
                if (Array.isArray(node.children)) {
                    for (let child of node.children) {
                        processNode(child);
                    }
                }
            }
            
            // Start processing the tree
            processNode(tree);
            return tree; // Return the modified tree
        }

        const socket = new WebSocket("ws://localhost:9000/ws");

        socket.onopen = () => {
        console.log("Connected to Racket WebSocket server");
        
        // Example: Send a JSON message to the server
        const message = JSON.stringify({ action: "greet", message: "Hello from JavaScript" });
        socket.send(message);
        };

        socket.onmessage = (event) => {
        console.log("Received from server:", event.data);
        const data = JSON.parse(event.data);

        // Handle the server's response
        if (data.response) {
            console.log("Server responded:", data.response);
        }
        };

        socket.onclose = () => {
        console.log("WebSocket connection closed");
        };

        socket.onerror = (error) => {
        console.error("WebSocket error:", error);
        };

    </script>
</body>
